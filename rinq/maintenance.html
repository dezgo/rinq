<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tina - Updating</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #2c3e50 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 50px 40px;
            max-width: 480px;
            text-align: center;
        }
        h1 {
            color: #c0392b;
            margin: 0 0 6px 0;
            font-size: 2.2em;
        }
        .subtitle {
            color: #888;
            font-size: 0.85em;
            margin: 0 0 30px 0;
        }
        .icon {
            font-size: 3.5em;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .message {
            font-size: 1.1em;
            color: #444;
            font-weight: 500;
            margin: 0 0 12px 0;
        }
        .detail {
            line-height: 1.7;
            color: #666;
            font-size: 0.95em;
            margin: 0 0 24px 0;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .refresh-note {
            color: #999;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128222;</div>
        <h1>Rinq</h1>
        <div class="subtitle">Business phones, sorted</div>
        <p class="message">Quick update in progress!</p>
        <p class="detail">
            We're rolling out improvements to make your phone experience
            even better. This only takes a few seconds.
        </p>
        <p class="refresh-note"><span class="spinner"></span>This page will refresh automatically</p>
    </div>
    <script>
        // Try to reconnect every 3 seconds
        setInterval(function() {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) {
                    // If we get a non-503/502/504 response, the app is back
                    if (r.ok) window.location.reload();
                })
                .catch(function() { /* still down, keep waiting */ });
        }, 3000);
    </script>
</body>
</html>
